name: Validate Package Arrays

on:
  push:
    branches: [main]
    paths:
      - 'lib/common.sh'
      - 'lib/packages.sh'
      - 'scripts/validate-packages.sh'
  pull_request:
    paths:
      - 'lib/common.sh'
      - 'lib/packages.sh'
      - 'scripts/validate-packages.sh'

defaults:
  run:
    shell: bash

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate package arrays
        run: bash scripts/validate-packages.sh
